<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SoundScript</title>
    <link rel="stylesheet" href="style.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
</head>

<body class="libre-baskerville-myfont">
    <div class="card">
        <h1>Speech to Text</h1>
        <p class="subtitle">Click the mic to start speaking</p>

        <textarea id="transcript" placeholder="Your speech will appear here..." readonly></textarea>

        <div class="controls">
            <button id="startBtn">Start Listening</button>
            <button id="stopBtn" disabled>Stop</button>
            <button id="clearBtn">Clear</button>
        </div>

        <div id="status" class="status"></div>
    </div>
    <script src="script.js"></script>


</body>

</html>
